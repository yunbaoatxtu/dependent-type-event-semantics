name: Verify

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install document test dependency
        run: python -m pip install ".[docx]"
      - name: Run deterministic checks
        run: python scripts/verify_project.py --skip-coq --require-docx
